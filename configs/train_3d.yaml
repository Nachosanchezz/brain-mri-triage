model:
  name: cnn3d
  in_channels: 2
  # Salida binaria: 1 logit. Sigmoid(logit) = probabilidad de tumor.
  n_classes: 1
  base_channels: 12
  dropout: 0.25

data:
  batch_size: 1
  # Sube a 2-4 si la GPU se queda esperando datos. En Windows, 0 es lo mas estable.
  num_workers: 0
  persistent_workers: true
  prefetch_factor: 2
  seed: 42
  # Poner true para regenerar el split estratificado por (dataset,label) y agrupado por subject_id.
  recreate_splits: true
  crop_shape: [128, 160, 128]
  # Center crop tambien en train: elimina el shift train(random)->val(center)
  # que estaba contribuyendo a la oscilacion de val_auc.
  random_crop_train: false
  augment_train: true
  splits:
    train_ratio: 0.70
    val_ratio: 0.15

training:
  n_epochs: 40
  # Lr mas bajo: el overfitting aparecia desde la epoca 2 con 1e-4.
  lr: 5.0e-5
  # Weight decay mas alto: regularizar el modelo pequeño.
  weight_decay: 1.0e-3
  patience: 10
  # AMP off con batch=1 + GroupNorm: float16 amplifica inestabilidades.
  # Volver a activarlo cuando se pueda subir el batch.
  amp: false
  # Clases ya equilibradas (~770 neg / 817 pos). pos_weight=1 elimina la
  # hipotesis "el loss favorece tumor".
  pos_weight: 1.0
  # Scheduler: cosine permite ajuste fino al final.
  scheduler: cosine
  # No guardar checkpoints con sensitivity por debajo de este umbral
  # (evita guardar modelos triviales "todo es sano").
  min_sensitivity_for_save: 0.80

performance:
  # Acelera convoluciones 3D cuando el tamano de entrada es estable.
  cudnn_benchmark: true
  # TF32 acelera Ampere/Ada con una pequena perdida numerica aceptable en entrenamiento.
  allow_tf32: true
  matmul_precision: high
  # Formato de memoria optimizado para Conv3D en CUDA.
  channels_last_3d: true
  # Puede acelerar, pero tarda al arrancar y en Windows a veces no compensa.
  compile: false

paths:
  checkpoint_dir: outputs/checkpoints
  plots_dir: outputs/plots
