# Config LODO (leave-one-dataset-out por clase).
# Copia de train_3d.yaml con dos cambios minimos:
#   - recreate_splits: false  -> no regenerar splits.json (lo escribe make_lodo_splits.py)
#   - checkpoint_dir          -> carpeta propia para no mezclar con la corrida contaminada
# Todo lo demas IDENTICO al train_3d.yaml original (mismo modelo, mismos hiperparametros)
# para que "confound vs LODO" sea una comparacion apples-to-apples.

model:
  name: cnn3d
  in_channels: 2
  n_classes: 1
  base_channels: 12
  dropout: 0.25

data:
  batch_size: 1
  num_workers: 0
  persistent_workers: true
  prefetch_factor: 2
  seed: 42
  # CLAVE: NO regenerar splits.json -> el split LODO ya esta escrito.
  recreate_splits: false
  crop_shape: [128, 160, 128]
  random_crop_train: false
  augment_train: true
  splits:
    # Estos valores no se usan (recreate_splits=false), se dejan por consistencia de schema.
    train_ratio: 0.70
    val_ratio: 0.15

training:
  n_epochs: 40
  lr: 5.0e-5
  weight_decay: 1.0e-3
  patience: 10
  amp: false
  pos_weight: 1.0
  scheduler: cosine
  min_sensitivity_for_save: 0.80

performance:
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  channels_last_3d: true
  compile: false

paths:
  # Carpeta LODO propia: cada corrida sigue creando su subcarpeta timestamped dentro.
  checkpoint_dir: outputs/checkpoints/lodo
  plots_dir: outputs/plots/lodo
